<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EXPA Account Login</title>
</head>
<body>
    <h1>Login with EXPA Account</h1>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if notice %}
        <p>{{ notice }}</p>
    {% endif %}

    <form method="post" action="{% url 'login_start' %}">
        {% csrf_token %}
        <label for="email">EXPA Email</label><br />
        <input id="email" type="email" name="email" required /><br /><br />

        <label for="password">EXPA Password</label><br />
        <input id="password" type="password" name="password" required /><br /><br />

        <button type="submit">Login</button>
    </form>

    <br />
    <hr />
    <h2>Or Use Standard OAuth</h2>
    <p>Click below to open the EXPA login popup.</p>
    <button onclick="openExpaLogin()">Login with EXPA (Popup)</button>
    
    <script>
        function openExpaLogin() {
            const width = 600;
            const height = 700;
            const left = (window.innerWidth - width) / 2;
            const top = (window.innerHeight - height) / 2;
            const popup = window.open('{% url "oauth_redirect" %}', 'EXPA Login', `width=${width},height=${height},left=${left},top=${top}`);

            if (!popup) {
                alert('Popup was blocked by the browser. Please allow popups for this site and try again.');
                return;
            }

            const checkClosed = setInterval(() => {
                if (popup.closed) {
                    clearInterval(checkClosed);
                    window.location.href = "{% url 'dashboard' %}";
                }
            }, 500);
        }
    </script>
</body>
</html>
