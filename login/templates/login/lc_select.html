<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select LC</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            padding: 24px;
        }
        .card {
            width: min(460px, 92vw);
            border-radius: 18px;
            padding: 28px 24px;
            background: rgba(255,255,255,0.09);
            border: 1px solid rgba(255,255,255,0.18);
        }
        h1 {
            margin: 0;
            font-size: 28px;
        }
        p {
            margin: 10px 0 0;
            color: rgba(248, 250, 252, 0.88);
        }
        .field {
            margin-top: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.95);
            color: #0f172a;
            font-size: 15px;
        }
        .error {
            margin-top: 10px;
            color: #fecaca;
            font-size: 14px;
        }
        .actions {
            margin-top: 18px;
            display: flex;
            gap: 10px;
        }
        button,
        .logout {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }
        button {
            background: #22d3ee;
            color: #0f172a;
        }
        .logout {
            background: rgba(255,255,255,0.2);
            color: #f8fafc;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Select LC</h1>
        <p>Logged in as {{ expa_email }}. Choose your LC to continue.</p>

        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="lc">LC</label>
                <select id="lc" name="lc" required>
                    <option value="">-- Select LC --</option>
                    {% for lc in available_lcs %}
                    <option value="{{ lc.value }}" {% if selected_lc == lc.value %}selected{% endif %}>{{ lc.label }}</option>
                    {% endfor %}
                </select>
            </div>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <div class="actions">
                <button type="submit">Continue</button>
                <a class="logout" href="{% url 'logout' %}">Logout</a>
            </div>
        </form>
    </main>
</body>
</html>
